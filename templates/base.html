<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}LibraryHub{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <!-- ── Navigation bar ─────────────────────────────────── -->
  <nav class="navbar">
    <div class="nav-brand">
      <span class="nav-icon">📚</span>
      <a href="{{ url_for('index') }}">LibraryHub</a>
    </div>
    <div class="nav-links">
      <a href="{{ url_for('index') }}" class="nav-link">All Books</a>
      <a href="{{ url_for('add_book') }}" class="nav-link btn-nav">+ Add Book</a>
    </div>
  </nav>

  <!-- ── Flash messages ─────────────────────────────────── -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-container">
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <!-- ── Main content ───────────────────────────────────── -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ─────────────────────────────────────────── -->
  <footer class="footer">
    <p>LibraryHub &mdash; Library Management Web App</p>
  </footer>

</body>
</html>
