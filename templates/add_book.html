{% extends "base.html" %}
{% block title %}Add a Book — LibraryHub{% endblock %}

{% block content %}

  <div class="page-header">
    <h1>Add a New Book</h1>
    <p class="page-subtitle">Fill in the details below to add a book to the library</p>
  </div>

  <div class="form-card">
    <form method="POST" action="{{ url_for('add_book') }}" novalidate>

      <!-- Title -->
      <div class="form-group">
        <label for="title" class="form-label">Book Title <span class="required">*</span></label>
        <input
          type="text"
          id="title"
          name="title"
          class="form-input"
          placeholder="e.g. The Great Gatsby"
          value="{{ request.form.get('title', '') }}"
          required
        />
      </div>

      <!-- Author -->
      <div class="form-group">
        <label for="author" class="form-label">Author <span class="required">*</span></label>
        <input
          type="text"
          id="author"
          name="author"
          class="form-input"
          placeholder="e.g. F. Scott Fitzgerald"
          value="{{ request.form.get('author', '') }}"
          required
        />
      </div>

      <!-- Genre -->
      <div class="form-group">
        <label for="genre" class="form-label">Genre</label>
        <select id="genre" name="genre" class="form-input">
          {% set genres = [
            "General", "Fiction", "Classic Fiction", "Science Fiction",
            "Non-Fiction", "Technology", "Mystery", "History",
            "Biography", "Philosophy", "Romance", "Fantasy", "Self-Help"
          ] %}
          {% for g in genres %}
            <option value="{{ g }}"
              {% if request.form.get('genre') == g %}selected{% endif %}>
              {{ g }}
            </option>
          {% endfor %}
        </select>
      </div>

      <!-- Buttons -->
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Add Book</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
      </div>

    </form>
  </div>

{% endblock %}
